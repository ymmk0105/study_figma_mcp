<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="micBg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#1a0005"/>
  <rect width="400" height="300" fill="url(#micBg)"/>
  <!-- Microphone body -->
  <ellipse cx="200" cy="110" rx="50" ry="65" fill="#c8c8c8"/>
  <ellipse cx="200" cy="110" rx="46" ry="61" fill="#e0e0e0"/>
  <!-- Mic head grill pattern -->
  <ellipse cx="200" cy="85" rx="42" ry="50" fill="#bdbdbd"/>
  <ellipse cx="200" cy="85" rx="38" ry="46" fill="#9e9e9e"/>
  <!-- Grill lines -->
  <line x1="162" y1="85" x2="238" y2="85" stroke="#777" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="70" x2="240" y2="70" stroke="#777" stroke-width="1.5" opacity="0.5"/>
  <line x1="163" y1="100" x2="237" y2="100" stroke="#777" stroke-width="1.5" opacity="0.5"/>
  <line x1="170" y1="55" x2="230" y2="55" stroke="#777" stroke-width="1.5" opacity="0.4"/>
  <line x1="175" y1="115" x2="225" y2="115" stroke="#777" stroke-width="1.5" opacity="0.4"/>
  <!-- Vertical grill lines -->
  <line x1="200" y1="39" x2="200" y2="131" stroke="#777" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="42" x2="178" y2="130" stroke="#777" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="42" x2="222" y2="130" stroke="#777" stroke-width="1" opacity="0.4"/>
  <!-- Mic body -->
  <rect x="188" y="170" width="24" height="70" rx="6" fill="#757575"/>
  <rect x="190" y="172" width="20" height="66" rx="5" fill="#9e9e9e"/>
  <!-- Mic band -->
  <rect x="185" y="165" width="30" height="10" rx="3" fill="#E60012"/>
  <!-- Base -->
  <ellipse cx="200" cy="242" rx="35" ry="8" fill="#616161"/>
  <rect x="185" y="236" width="30" height="14" rx="4" fill="#757575"/>
  <!-- Stand base foot -->
  <ellipse cx="200" cy="258" rx="55" ry="10" fill="#424242"/>
  <!-- Glow effect -->
  <ellipse cx="200" cy="85" rx="42" ry="50" fill="#E60012" opacity="0.05"/>
  <!-- Reflection on mic -->
  <ellipse cx="185" cy="75" rx="10" ry="18" fill="white" opacity="0.12"/>
  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">FAQ — Placeholder Image</text>
</svg>
