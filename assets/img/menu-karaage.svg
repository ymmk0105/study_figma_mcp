<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="plateBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffecb3"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#ff8f00"/>
  <rect width="400" height="300" fill="url(#plateBg)" opacity="0.15"/>
  <!-- Plate -->
  <ellipse cx="200" cy="165" rx="130" ry="20" fill="rgba(0,0,0,0.15)"/>
  <ellipse cx="200" cy="160" rx="135" ry="22" fill="white" opacity="0.9"/>
  <!-- Karaage pieces -->
  <ellipse cx="180" cy="145" rx="40" ry="30" fill="#c8540a" transform="rotate(-15 180 145)"/>
  <ellipse cx="180" cy="145" rx="36" ry="26" fill="#e65c00" transform="rotate(-15 180 145)"/>
  <ellipse cx="180" cy="145" rx="28" ry="20" fill="#bf4500" transform="rotate(-15 180 145)" opacity="0.5"/>
  <ellipse cx="225" cy="140" rx="38" ry="28" fill="#c8540a" transform="rotate(10 225 140)"/>
  <ellipse cx="225" cy="140" rx="34" ry="24" fill="#e65c00" transform="rotate(10 225 140)"/>
  <ellipse cx="200" cy="125" rx="36" ry="26" fill="#c8540a" transform="rotate(-5 200 125)"/>
  <ellipse cx="200" cy="125" rx="32" ry="22" fill="#d4560a" transform="rotate(-5 200 125)"/>
  <!-- Garnish (lemon) -->
  <circle cx="255" cy="155" r="18" fill="#fff176"/>
  <ellipse cx="255" cy="155" rx="14" ry="18" fill="#ffee58"/>
  <line x1="255" y1="137" x2="255" y2="173" stroke="#f9a825" stroke-width="1.5" opacity="0.6"/>
  <line x1="237" y1="155" x2="273" y2="155" stroke="#f9a825" stroke-width="1.5" opacity="0.6"/>
  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" font-weight="600">Karaage (Fried Chicken)</text>
</svg>
