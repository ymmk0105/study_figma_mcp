<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="concertBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="50%" stop-color="#2d0050"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <radialGradient id="stageLight1" cx="30%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff4081" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stageLight2" cx="70%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#concertBg)"/>
  <rect width="600" height="450" fill="url(#stageLight1)"/>
  <rect width="600" height="450" fill="url(#stageLight2)"/>
  <!-- Screen on wall -->
  <rect x="60" y="30" width="480" height="280" fill="#0a0015" rx="6"/>
  <rect x="64" y="34" width="472" height="272" fill="#100025" rx="4"/>
  <!-- Stage scene on screen -->
  <!-- Stage lighting rays -->
  <line x1="180" y1="34" x2="120" y2="300" stroke="#ff4081" stroke-width="60" stroke-opacity="0.12"/>
  <line x1="300" y1="34" x2="300" y2="300" stroke="white" stroke-width="40" stroke-opacity="0.08"/>
  <line x1="420" y1="34" x2="480" y2="300" stroke="#7c4dff" stroke-width="60" stroke-opacity="0.12"/>
  <!-- Stage floor -->
  <rect x="64" y="240" width="472" height="66" fill="#1a003a"/>
  <!-- Performer silhouette -->
  <circle cx="300" cy="195" r="22" fill="#fff" opacity="0.9"/>
  <rect x="287" y="217" width="26" height="50" fill="#fff" opacity="0.9" rx="4"/>
  <!-- Arm with mic -->
  <line x1="313" y1="230" x2="340" y2="215" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <ellipse cx="345" cy="212" rx="8" ry="12" fill="#ccc" opacity="0.9"/>
  <!-- Crowd silhouettes -->
  <circle cx="100" cy="310" r="20" fill="rgba(255,255,255,0.08)"/>
  <rect x="80" y="325" width="40" height="40" rx="4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="160" cy="305" r="18" fill="rgba(255,255,255,0.07)"/>
  <rect x="142" y="320" width="36" height="45" rx="4" fill="rgba(255,255,255,0.05)"/>
  <circle cx="220" cy="312" r="20" fill="rgba(255,255,255,0.08)"/>
  <rect x="200" y="328" width="40" height="37" rx="4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="380" cy="308" r="20" fill="rgba(255,255,255,0.08)"/>
  <rect x="360" y="323" width="40" height="42" rx="4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="440" cy="310" r="18" fill="rgba(255,255,255,0.07)"/>
  <rect x="422" y="324" width="36" height="41" rx="4" fill="rgba(255,255,255,0.05)"/>
  <circle cx="500" cy="305" r="20" fill="rgba(255,255,255,0.08)"/>
  <rect x="480" y="320" width="40" height="45" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Phone lights in crowd -->
  <rect x="93" y="300" width="10" height="7" fill="#fff" opacity="0.6" rx="1"/>
  <rect x="213" y="298" width="10" height="7" fill="#fff" opacity="0.5" rx="1"/>
  <rect x="373" y="297" width="10" height="7" fill="#fff" opacity="0.6" rx="1"/>
  <rect x="493" y="293" width="10" height="7" fill="#fff" opacity="0.5" rx="1"/>
  <!-- Confetti -->
  <rect x="130" y="80" width="8" height="4" fill="#ff4081" opacity="0.8" transform="rotate(30 134 82)"/>
  <rect x="380" y="100" width="6" height="3" fill="#ffd740" opacity="0.7" transform="rotate(-20 383 102)"/>
  <rect x="460" y="70" width="8" height="4" fill="#69f0ae" opacity="0.7" transform="rotate(45 464 72)"/>
  <rect x="200" y="90" width="6" height="3" fill="#00e5ff" opacity="0.6" transform="rotate(-35 203 92)"/>
  <!-- TV frame / stand -->
  <rect x="270" y="310" width="60" height="15" rx="3" fill="#0a0015"/>
  <rect x="230" y="323" width="140" height="8" rx="4" fill="#060010"/>
  <!-- Audience in foreground -->
  <ellipse cx="150" cy="420" rx="60" ry="30" fill="rgba(255,255,255,0.04)"/>
  <ellipse cx="300" cy="430" rx="80" ry="25" fill="rgba(255,255,255,0.03)"/>
  <ellipse cx="450" cy="418" rx="65" ry="30" fill="rgba(255,255,255,0.04)"/>
  <!-- Label -->
  <text x="300" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Raibo Live Viewing — Placeholder Image</text>
</svg>
