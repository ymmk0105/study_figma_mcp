<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0005"/>
      <stop offset="50%" stop-color="#4a0010"/>
      <stop offset="100%" stop-color="#E60012"/>
    </linearGradient>
    <radialGradient id="spotlight1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotlight2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1440" height="720" fill="url(#bg)"/>
  <rect width="1440" height="720" fill="url(#spotlight1)"/>
  <rect width="1440" height="720" fill="url(#spotlight2)"/>
  <!-- Stage lights -->
  <line x1="200" y1="0" x2="400" y2="720" stroke="#ff6b6b" stroke-width="80" stroke-opacity="0.06"/>
  <line x1="500" y1="0" x2="600" y2="720" stroke="#ffffff" stroke-width="40" stroke-opacity="0.04"/>
  <line x1="900" y1="0" x2="750" y2="720" stroke="#ff1744" stroke-width="60" stroke-opacity="0.06"/>
  <line x1="1200" y1="0" x2="1100" y2="720" stroke="#ffffff" stroke-width="40" stroke-opacity="0.04"/>
  <!-- Stars / dots -->
  <circle cx="100" cy="80" r="3" fill="white" opacity="0.5"/>
  <circle cx="300" cy="150" r="2" fill="white" opacity="0.4"/>
  <circle cx="600" cy="60" r="4" fill="white" opacity="0.3"/>
  <circle cx="900" cy="100" r="2" fill="white" opacity="0.5"/>
  <circle cx="1200" cy="70" r="3" fill="white" opacity="0.4"/>
  <circle cx="1350" cy="200" r="2" fill="white" opacity="0.3"/>
  <!-- Large microphone silhouette -->
  <g transform="translate(1000, 120) scale(1.8)" opacity="0.15">
    <ellipse cx="60" cy="60" rx="45" ry="60" fill="white"/>
    <rect x="48" y="120" width="24" height="80" rx="5" fill="white"/>
    <rect x="20" y="195" width="80" height="10" rx="5" fill="white"/>
  </g>
  <!-- Musical notes -->
  <text x="160" y="200" font-size="48" fill="white" opacity="0.15" font-family="serif">&#9835;</text>
  <text x="1100" y="300" font-size="64" fill="white" opacity="0.12" font-family="serif">&#9833;</text>
  <text x="80" y="500" font-size="36" fill="white" opacity="0.1" font-family="serif">&#9834;</text>
  <!-- Label -->
  <text x="720" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="white" opacity="0.5">Karaoke Wanwan</text>
  <text x="720" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.3">Hero Image Placeholder — Replace with actual photo</text>
</svg>
