<svg xmlns="http://www.w3.org/2000/svg" width="600" height="338" viewBox="0 0 600 338">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="338" fill="url(#nightSky)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="420" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="520" cy="45" r="1" fill="white" opacity="0.4"/>
  <!-- Buildings background -->
  <rect x="0" y="120" width="100" height="220" fill="#1a1a3e" opacity="0.8"/>
  <rect x="80" y="80" width="80" height="260" fill="#252550" opacity="0.8"/>
  <rect x="440" y="90" width="100" height="250" fill="#1a1a3e" opacity="0.8"/>
  <rect x="520" y="60" width="80" height="280" fill="#252550" opacity="0.8"/>
  <!-- Main building -->
  <rect x="150" y="60" width="300" height="280" fill="#1e1e4f"/>
  <rect x="150" y="60" width="300" height="280" fill="#E60012" opacity="0.05"/>
  <!-- Windows with lights -->
  <rect x="170" y="80" width="30" height="20" fill="#fff176" opacity="0.9" rx="2"/>
  <rect x="210" y="80" width="30" height="20" fill="#fff176" opacity="0.8" rx="2"/>
  <rect x="250" y="80" width="30" height="20" fill="#fff9c4" opacity="0.7" rx="2"/>
  <rect x="290" y="80" width="30" height="20" fill="#fff176" opacity="0.9" rx="2"/>
  <rect x="330" y="80" width="30" height="20" fill="#fff176" opacity="0.6" rx="2"/>
  <rect x="370" y="80" width="30" height="20" fill="#fff9c4" opacity="0.8" rx="2"/>
  <rect x="170" y="115" width="30" height="20" fill="#fff9c4" opacity="0.7" rx="2"/>
  <rect x="210" y="115" width="30" height="20" fill="#fff176" opacity="0.9" rx="2"/>
  <rect x="250" y="115" width="30" height="20" fill="#fff176" opacity="0.8" rx="2"/>
  <rect x="290" y="115" width="30" height="20" fill="#fff9c4" opacity="0.6" rx="2"/>
  <rect x="330" y="115" width="30" height="20" fill="#fff176" opacity="0.9" rx="2"/>
  <rect x="370" y="115" width="30" height="20" fill="#fff176" opacity="0.7" rx="2"/>
  <rect x="170" y="150" width="30" height="20" fill="#fff176" opacity="0.5" rx="2"/>
  <rect x="210" y="150" width="30" height="20" fill="#fff9c4" opacity="0.8" rx="2"/>
  <rect x="290" y="150" width="30" height="20" fill="#fff176" opacity="0.7" rx="2"/>
  <rect x="370" y="150" width="30" height="20" fill="#fff9c4" opacity="0.9" rx="2"/>
  <!-- Neon sign -->
  <rect x="185" y="185" width="230" height="60" fill="#E60012" rx="4"/>
  <text x="300" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="800">カラオケ</text>
  <text x="300" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="900">まねきねこ</text>
  <!-- Street level -->
  <rect x="0" y="285" width="600" height="55" fill="#0a0a20"/>
  <!-- Street lights reflection -->
  <rect x="180" y="285" width="240" height="4" fill="#E60012" opacity="0.6"/>
  <!-- Entrance -->
  <rect x="255" y="240" width="90" height="50" fill="#333390" rx="2"/>
  <rect x="255" y="240" width="44" height="50" fill="#252580" rx="2"/>
  <rect x="260" y="290" width="80" height="5" fill="#1a1a50"/>
  <!-- Label -->
  <text x="300" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Shibuya Store — Placeholder Image</text>
</svg>
